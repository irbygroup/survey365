# Survey365 + RTKBase reverse proxy
# Nginx takes port 80, proxies both apps behind a single entry point.
#
# Routes:
#   /           -> Survey365 (localhost:8080)
#   /rtkbase    -> RTKBase   (localhost:8000)
#   /ws         -> WebSocket (localhost:8080)

upstream survey365_backend {
    server 127.0.0.1:8080;
    keepalive 8;
}

upstream rtkbase_backend {
    server 127.0.0.1:8000;
    keepalive 4;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # ── Gzip compression ────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 256;
    gzip_types
        text/html
        text/css
        text/plain
        text/xml
        application/json
        application/javascript
        application/xml
        image/svg+xml;

    # ── Proxy headers (shared) ──────────────────────────────────────
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── WebSocket: /ws/ ─────────────────────────────────────────────
    location /ws/ {
        proxy_pass http://survey365_backend;

        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket connections are long-lived
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── RTKBase: /rtkbase ───────────────────────────────────────────
    # Proxy to RTKBase on port 8000, strip the /rtkbase prefix
    location /rtkbase/ {
        proxy_pass http://rtkbase_backend/;

        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # RTKBase uses Socket.IO for its own WebSocket connections
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
    }

    # Redirect /rtkbase (no trailing slash) to /rtkbase/
    location = /rtkbase {
        return 301 /rtkbase/;
    }

    # ── Static assets: cache headers ────────────────────────────────
    # Survey365 serves static files from /ui/ via FastAPI StaticFiles
    location ~* ^/(?:css|js|images|fonts)/.*\.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        proxy_pass http://survey365_backend;

        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Survey365: / (default) ──────────────────────────────────────
    location / {
        proxy_pass http://survey365_backend;

        proxy_http_version 1.1;
        proxy_buffering off;

        # Needed for HTMX streaming responses (SSE)
        proxy_set_header Connection "";
    }

    # ── Error pages ─────────────────────────────────────────────────
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
