<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0f172a">
  <title>Survey365 - Admin</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
  <!-- Pico.css -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <!-- Survey365 custom styles -->
  <link rel="stylesheet" href="/css/survey365.css">
  <style>
    html {
      min-height: 100%;
      height: auto;
      overflow-y: auto;
      background: #f8fafc;
    }
  </style>

  <!-- HTMX -->
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <!-- Alpine.js -->
  <script defer src="https://unpkg.com/alpinejs@3.14.8/dist/cdn.min.js"></script>
</head>
<body class="s365-admin-page" x-data="adminPanel()" x-init="init()" x-cloak>

  <!-- Header -->
  <div class="s365-admin-header">
    <a href="/" class="s365-admin-nav s365-admin-nav-back" title="Back to map" aria-label="Back to map">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </a>
    <div class="s365-admin-header-copy">
      <div class="s365-admin-kicker">Settings</div>
      <h1>Survey365 Admin</h1>
    </div>
    <a href="/" class="s365-admin-nav s365-admin-nav-map">Map</a>
  </div>

  <!-- Auth check overlay -->
  <template x-if="!authenticated && authChecked">
    <div class="s365-admin-gate">
      <div class="s365-admin-gate-card">
        <div class="s365-admin-kicker">Secure Access</div>
        <h2>Authentication Required</h2>
        <p>You need to log in to access admin settings.</p>
        <a href="/login.html?next=/admin.html" class="s365-btn s365-btn-primary s365-btn-link">
        Log In
        </a>
      </div>
    </div>
  </template>

  <!-- Loading -->
  <div x-show="!authChecked" class="s365-admin-loading">
    <div class="s365-admin-status-panel">
      <p aria-busy="true">Loading admin workspace...</p>
    </div>
  </div>

  <!-- Admin Content -->
  <template x-if="authenticated && authChecked">
    <div class="s365-admin-content">
      <section class="s365-admin-hero">
        <div class="s365-admin-hero-copy">
          <div class="s365-admin-kicker">Control Center</div>
          <h2>Manage field data, connections, and system behavior from one place.</h2>
          <p>Points, NTRIP routing, Wi-Fi provisioning, receiver behavior, updates, and access control are grouped here with a consistent workflow.</p>
        </div>
        <div class="s365-admin-hero-stats">
          <div class="s365-admin-stat-card">
            <span class="s365-admin-stat-label">Saved Points</span>
            <strong class="s365-admin-stat-value" x-text="sites.length"></strong>
            <span class="s365-admin-stat-meta">Project control and benchmarks</span>
          </div>
          <div class="s365-admin-stat-card">
            <span class="s365-admin-stat-label">NTRIP Profiles</span>
            <strong class="s365-admin-stat-value" x-text="ntripProfiles.length"></strong>
            <span class="s365-admin-stat-meta">Inbound, outbound, and local caster links</span>
          </div>
          <div class="s365-admin-stat-card">
            <span class="s365-admin-stat-label">Wi-Fi Networks</span>
            <strong class="s365-admin-stat-value" x-text="wifiNetworks.length"></strong>
            <span class="s365-admin-stat-meta">Stored adapter profiles</span>
          </div>
          <div class="s365-admin-stat-card">
            <span class="s365-admin-stat-label">Updater</span>
            <strong class="s365-admin-stat-value" x-text="updateStatus.update_in_progress ? 'Running' : (updateStatus.update_available ? 'Ready' : 'Current')"></strong>
            <span class="s365-admin-stat-meta" x-text="updateStatus.repo_reachable ? 'Main branch status tracked' : 'Remote check unavailable'"></span>
          </div>
        </div>
      </section>

      <!-- ===== Sites Management ===== -->
      <div class="s365-admin-section">
        <div class="s365-section-heading">
          <div>
            <h2>Saved Points</h2>
            <p>Project control points, benchmarks, and reference positions available to crews in the field.</p>
          </div>
        </div>

        <!-- Project filter -->
        <div class="s365-toolbar">
          <label for="project-filter" class="s365-inline-label">Project</label>
          <select id="project-filter" name="project_filter" x-model="filterProjectId" @change="_loadSites()"
                  class="s365-admin-select-compact">
            <option value="all">All Projects</option>
            <template x-for="p in projects" :key="p.id">
              <option :value="p.id" x-text="p.name"></option>
            </template>
          </select>
        </div>

        <div x-show="sitesLoading" class="s365-admin-status-panel">
          <p aria-busy="true">Loading points...</p>
        </div>

        <div x-show="!sitesLoading && sites.length === 0" class="s365-empty">
          <p>No saved points yet.</p>
        </div>

        <div class="s365-admin-table-wrap" x-show="!sitesLoading && sites.length > 0">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Coordinates</th>
              <th>Source</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <template x-for="site in sites" :key="site.id">
              <tr>
                <td>
                  <strong x-text="site.name"></strong>
                  <br>
                  <small class="s365-admin-muted" x-text="site.notes || ''"></small>
                </td>
                <td class="s365-mono-cell">
                  <span x-text="parseFloat(site.lat).toFixed(8)"></span>,
                  <span x-text="parseFloat(site.lon).toFixed(8)"></span>
                  <template x-if="site.ortho_height != null || site.height != null">
                    <span x-text="' @ ' + parseFloat(site.ortho_height != null ? site.ortho_height : site.height).toFixed(3) + 'm ' + (site.ortho_height != null ? 'NAVD88' : 'ellip')"></span>
                  </template>
                </td>
                <td><span class="site-source-badge" :class="site.source || ''" x-text="site.source || '--'"></span></td>
                <td>
                  <div class="admin-actions">
                    <button class="s365-btn s365-btn-secondary" @click="editSite(site)">Edit</button>
                    <button class="s365-btn s365-btn-danger" @click="deleteSite(site)">Delete</button>
                  </div>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
        </div>

        <button @click="openAddSite()" class="s365-btn s365-btn-primary s365-section-cta">
          Add Point
        </button>
      </div>

      <!-- ===== Add/Edit Site Form ===== -->
      <template x-if="showSiteForm">
        <div class="s365-admin-section">
          <div class="s365-section-heading">
            <div>
              <h2 x-text="editingSite ? 'Edit Point' : 'Add Point'"></h2>
              <p>Capture control point coordinates, elevation, accuracy, and notes in one record.</p>
            </div>
          </div>
          <form @submit.prevent="saveSite()" class="s365-admin-form">
            <label for="site-name">Name</label>
            <input type="text" id="site-name" name="site_name" x-model="siteForm.name" required placeholder="e.g. Oak Street PK Nail">

            <div class="s365-form-grid s365-form-grid-2">
              <div>
                <label for="site-lat">Latitude</label>
                <input type="number" id="site-lat" name="site_lat" x-model="siteForm.lat" step="any" required placeholder="30.694512">
              </div>
              <div>
                <label for="site-lon">Longitude</label>
                <input type="number" id="site-lon" name="site_lon" x-model="siteForm.lon" step="any" required placeholder="-88.043281">
              </div>
            </div>

            <div class="s365-form-grid s365-form-grid-2">
              <div>
                <label for="site-height">Ellipsoid Height (m)</label>
                <input type="number" id="site-height" name="site_height" x-model="siteForm.height" step="any" placeholder="Optional">
              </div>
              <div>
                <label for="site-source">Source</label>
                <select id="site-source" name="site_source" x-model="siteForm.source">
                  <option value="manual">Manual</option>
                  <option value="cors_rtk">CORS RTK</option>
                  <option value="opus">OPUS</option>
                  <option value="averaged">Averaged</option>
                  <option value="imported">Imported</option>
                </select>
              </div>
            </div>

            <div class="s365-form-grid s365-form-grid-2">
              <div>
                <label for="site-acc-h">H Accuracy (m)</label>
                <input type="number" id="site-acc-h" name="site_accuracy_h" x-model="siteForm.accuracy_h" step="any" placeholder="Optional">
              </div>
              <div>
                <label for="site-acc-v">V Accuracy (m)</label>
                <input type="number" id="site-acc-v" name="site_accuracy_v" x-model="siteForm.accuracy_v" step="any" placeholder="Optional">
              </div>
            </div>

            <label for="site-notes">Notes</label>
            <input type="text" id="site-notes" name="site_notes" x-model="siteForm.notes" placeholder="Optional notes">

            <div class="s365-form-actions">
              <button type="submit" class="s365-btn s365-btn-primary" x-text="editingSite ? 'Update' : 'Add Point'"></button>
              <button type="button" class="s365-btn s365-btn-secondary" @click="closeSiteForm()">Cancel</button>
            </div>
          </form>
          <p x-show="siteFormError" class="s365-status-text s365-status-error" x-text="siteFormError"></p>
        </div>
      </template>

      <!-- ===== NTRIP Profiles ===== -->
      <div class="s365-admin-section">
        <div class="s365-section-heading">
          <div>
            <h2>NTRIP Profiles</h2>
            <p>Manage outbound caster pushes, inbound correction sources, and local distribution on the LAN.</p>
          </div>
        </div>

        <div x-show="ntripLoading" class="s365-admin-status-panel">
          <p aria-busy="true">Loading profiles...</p>
        </div>

        <div x-show="!ntripLoading && ntripProfiles.length === 0" class="s365-empty">
          <p>No NTRIP profiles configured.</p>
        </div>

        <div class="s365-admin-table-wrap" x-show="!ntripLoading && ntripProfiles.length > 0">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Type</th>
              <th>Host</th>
              <th>Mountpoint</th>
              <th>Default</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <template x-for="p in ntripProfiles" :key="p.id">
              <tr>
                <td><strong x-text="p.name"></strong></td>
                <td>
                  <span class="s365-type-pill"
                        x-text="p.type === 'outbound_caster' ? 'Outbound' : p.type === 'inbound_cors' ? 'CORS' : 'Local'"></span>
                </td>
                <td class="s365-mono-cell" x-text="(p.host || '') + (p.port ? ':' + p.port : '')"></td>
                <td class="s365-mono-cell" x-text="p.mountpoint || '--'"></td>
                <td x-text="p.is_default ? 'Yes' : ''"></td>
                <td>
                  <div class="admin-actions">
                    <button class="s365-btn s365-btn-secondary" @click="editNtrip(p)">Edit</button>
                    <button class="s365-btn s365-btn-danger" @click="deleteNtrip(p)">Delete</button>
                  </div>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
        </div>

        <button @click="openAddNtrip()" class="s365-btn s365-btn-primary s365-section-cta">
          Add NTRIP Profile
        </button>
      </div>

      <!-- ===== Add/Edit NTRIP Profile Form ===== -->
      <template x-if="showNtripForm">
        <div class="s365-admin-section">
          <div class="s365-section-heading">
            <div>
              <h2 x-text="editingNtrip ? 'Edit NTRIP Profile' : 'Add NTRIP Profile'"></h2>
              <p>Define the connection target, credentials, mountpoint, and default routing behavior.</p>
            </div>
          </div>
          <form @submit.prevent="saveNtrip()" class="s365-admin-form">
            <label for="ntrip-name">Profile Name</label>
            <input type="text" id="ntrip-name" name="ntrip_name" x-model="ntripForm.name" required placeholder="e.g. Emlid Caster">

            <label for="ntrip-type">Type</label>
            <select id="ntrip-type" name="ntrip_type" x-model="ntripForm.type" required>
              <option value="outbound_caster">Outbound Caster (push corrections)</option>
              <option value="inbound_cors">CORS Source (receive corrections)</option>
              <option value="local_caster">Local Caster (serve to LAN)</option>
            </select>

            <div class="s365-form-grid s365-form-grid-wide">
              <div>
                <label for="ntrip-host">Host</label>
                <input type="text" id="ntrip-host" name="ntrip_host" x-model="ntripForm.host" placeholder="e.g. caster.emlid.com">
              </div>
              <div>
                <label for="ntrip-port">Port</label>
                <input type="number" id="ntrip-port" name="ntrip_port" x-model="ntripForm.port" placeholder="2101" min="1" max="65535">
              </div>
            </div>

            <label for="ntrip-mount">Mountpoint</label>
            <input type="text" id="ntrip-mount" name="ntrip_mountpoint" x-model="ntripForm.mountpoint" placeholder="e.g. SURVEY365">

            <div class="s365-form-grid s365-form-grid-2">
              <div>
                <label for="ntrip-user">Username</label>
                <input type="text" id="ntrip-user" name="ntrip_username" x-model="ntripForm.username" placeholder="Optional">
              </div>
              <div>
                <label for="ntrip-pass">Password</label>
                <input type="text" id="ntrip-pass" name="ntrip_password" x-model="ntripForm.password" placeholder="Optional">
              </div>
            </div>

            <label class="s365-checkbox-row" for="ntrip-default">
              <input type="checkbox" id="ntrip-default" name="ntrip_default" x-model="ntripForm.is_default">
              Set as default for this type
            </label>

            <label for="ntrip-notes">Notes</label>
            <input type="text" id="ntrip-notes" name="ntrip_notes" x-model="ntripForm.notes" placeholder="Optional notes">

            <div class="s365-form-actions">
              <button type="submit" class="s365-btn s365-btn-primary" x-text="editingNtrip ? 'Update' : 'Add Profile'"></button>
              <button type="button" class="s365-btn s365-btn-secondary" @click="closeNtripForm()">Cancel</button>
            </div>
          </form>
          <p x-show="ntripFormError" class="s365-status-text s365-status-error" x-text="ntripFormError"></p>
        </div>
      </template>

      <!-- ===== Wi-Fi Networks ===== -->
      <div class="s365-admin-section">
        <div class="s365-section-heading">
          <div>
            <h2>Wi-Fi Networks</h2>
            <p>Store known Wi-Fi credentials in the database and push them onto both adapters when needed.</p>
          </div>
        </div>
        <p class="s365-section-note">
          Survey365 stores known Wi-Fi networks in the database and applies them to both adapters.
          Passwords are write-only and are never shown again after save.
        </p>

        <div x-show="wifiLoading" class="s365-admin-status-panel">
          <p aria-busy="true">Loading Wi-Fi networks...</p>
        </div>

        <div x-show="!wifiLoading && wifiNetworks.length === 0" class="s365-empty">
          <p>No Wi-Fi networks saved yet.</p>
        </div>

        <div class="s365-admin-table-wrap" x-show="!wifiLoading && wifiNetworks.length > 0">
        <table>
          <thead>
            <tr>
              <th>SSID</th>
              <th>Priority</th>
              <th>Metric</th>
              <th>Password</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <template x-for="network in wifiNetworks" :key="network.id">
              <tr>
                <td><strong x-text="network.ssid"></strong></td>
                <td x-text="network.priority"></td>
                <td x-text="network.metric"></td>
                <td x-text="network.password_set ? 'Stored' : 'Missing'"></td>
                <td>
                  <div class="admin-actions">
                    <button class="s365-btn s365-btn-secondary" @click="editWifi(network)">Edit</button>
                    <button class="s365-btn s365-btn-danger" @click="deleteWifi(network)">Delete</button>
                  </div>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
        </div>

        <div class="s365-form-actions">
          <button @click="openAddWifi()" class="s365-btn s365-btn-primary">
            Add Wi-Fi Network
          </button>
          <button type="button" class="s365-btn s365-btn-secondary" @click="applyWifi()" :disabled="wifiApplyBusy">
            <span x-text="wifiApplyBusy ? 'Applying...' : 'Apply to Pi'"></span>
          </button>
        </div>

        <p x-show="wifiApplySuccess" class="s365-status-text s365-status-success" x-text="wifiApplySuccess"></p>
        <p x-show="wifiApplyError" class="s365-status-text s365-status-error" x-text="wifiApplyError"></p>
      </div>

      <template x-if="showWifiForm">
        <div class="s365-admin-section">
          <div class="s365-section-heading">
            <div>
              <h2 x-text="editingWifi ? 'Edit Wi-Fi Network' : 'Add Wi-Fi Network'"></h2>
              <p>Set network identity, secret, and connection priority before pushing settings to the Pi.</p>
            </div>
          </div>
          <form @submit.prevent="saveWifi()" class="s365-admin-form">
            <label for="wifi-ssid">SSID</label>
            <input type="text" id="wifi-ssid" name="wifi_ssid" x-model="wifiForm.ssid" required placeholder="Network name">

            <label for="wifi-password" x-text="editingWifi ? 'Password (leave blank to keep current)' : 'Password'"></label>
            <input type="password" id="wifi-password" name="wifi_password" x-model="wifiForm.password" :required="!editingWifi" placeholder="Wi-Fi password">

            <div class="s365-form-grid s365-form-grid-2">
              <div>
                <label for="wifi-priority">Priority</label>
                <input type="number" id="wifi-priority" name="wifi_priority" x-model="wifiForm.priority" step="1">
              </div>
              <div>
                <label for="wifi-metric">Metric</label>
                <input type="number" id="wifi-metric" name="wifi_metric" x-model="wifiForm.metric" min="1" step="1">
              </div>
            </div>

            <div class="s365-form-actions">
              <button type="submit" class="s365-btn s365-btn-primary" x-text="editingWifi ? 'Update Network' : 'Add Network'"></button>
              <button type="button" class="s365-btn s365-btn-secondary" @click="closeWifiForm()">Cancel</button>
            </div>
          </form>
          <p x-show="wifiFormError" class="s365-status-text s365-status-error" x-text="wifiFormError"></p>
        </div>
      </template>

      <!-- ===== Config Settings ===== -->
      <div class="s365-admin-section">
        <div class="s365-section-heading">
          <div>
            <h2>Configuration</h2>
            <p>Receiver setup, data logging, local caster output, and default map/session behavior.</p>
          </div>
        </div>
        <form @submit.prevent="saveConfig()" class="s365-admin-form">
          <h3 class="s365-admin-subheading">GNSS Receiver</h3>
          <p class="s365-section-note">
            Receiver connection and RTCM settings apply after restarting the Survey365 service.
          </p>

          <div class="s365-form-grid s365-form-grid-3">
            <div>
              <label for="cfg-gnss-port">Serial Port</label>
              <input type="text" id="cfg-gnss-port" name="cfg_gnss_port" x-model="config.gnss_port" placeholder="/dev/ttyGNSS">
            </div>
            <div>
              <label for="cfg-gnss-baud">Baud</label>
              <input type="number" id="cfg-gnss-baud" name="cfg_gnss_baud" x-model="config.gnss_baud" min="4800" step="1">
            </div>
            <div>
              <label for="cfg-gnss-backend">Backend</label>
              <select id="cfg-gnss-backend" name="cfg_gnss_backend" x-model="config.gnss_backend">
                <option value="ublox">u-blox</option>
                <option value="quectel">Quectel (stub)</option>
              </select>
            </div>
          </div>

          <label for="cfg-rtcm-messages">RTCM Messages</label>
          <input type="text" id="cfg-rtcm-messages" name="cfg_rtcm_messages" x-model="config.rtcm_messages"
                 placeholder="1005(10),1077,1087,1097,1127,1230(10)">

          <div class="s365-form-grid s365-form-grid-2">
            <div>
              <label for="cfg-antenna-height">Antenna Height (m)</label>
              <input type="number" id="cfg-antenna-height" name="cfg_antenna_height" x-model="config.antenna_height_m" step="any" min="0">
            </div>
            <div>
              <label for="cfg-elevation-display">Elevation Display</label>
              <input type="text" id="cfg-elevation-display" name="cfg_elevation_display" value="Primary: NAVD88 ground elevation" readonly class="s365-readonly-input">
            </div>
          </div>

          <h3 class="s365-admin-subheading">RTCM Outputs</h3>
          <label class="s365-checkbox-row" for="cfg-rinex-enabled">
            <input type="checkbox" id="cfg-rinex-enabled" name="cfg_rinex_enabled" x-model="config.rinex_enabled">
            Enable raw RTCM logging
          </label>

          <div class="s365-form-grid s365-form-grid-2">
            <div>
              <label for="cfg-rinex-rotate">RINEX Rotate Hours</label>
              <input type="number" id="cfg-rinex-rotate" name="cfg_rinex_rotate_hours" x-model="config.rinex_rotate_hours" min="1" step="1">
            </div>
            <div>
              <label for="cfg-rinex-dir">RINEX Data Dir</label>
              <input type="text" id="cfg-rinex-dir" name="cfg_rinex_data_dir" x-model="config.rinex_data_dir" placeholder="data/rinex">
            </div>
          </div>

          <label class="s365-checkbox-row" for="cfg-local-caster-enabled">
            <input type="checkbox" id="cfg-local-caster-enabled" name="cfg_local_caster_enabled" x-model="config.local_caster_enabled">
            Enable local NTRIP caster
          </label>

          <div class="s365-form-grid s365-form-grid-2">
            <div>
              <label for="cfg-local-caster-port">Local Caster Port</label>
              <input type="number" id="cfg-local-caster-port" name="cfg_local_caster_port" x-model="config.local_caster_port" min="1" max="65535" step="1">
            </div>
            <div>
              <label for="cfg-local-caster-mount">Local Caster Mountpoint</label>
              <input type="text" id="cfg-local-caster-mount" name="cfg_local_caster_mountpoint" x-model="config.local_caster_mountpoint" placeholder="SURVEY365">
            </div>
          </div>

          <p class="s365-section-note">
            Default outbound NTRIP caster profiles start automatically when base mode is active.
          </p>

          <h3 class="s365-admin-subheading">Map and Session</h3>
          <label for="cfg-maptiler">MapTiler API Key</label>
          <input type="text" id="cfg-maptiler" name="cfg_maptiler_key" x-model="config.maptiler_key" placeholder="Your MapTiler key">

          <div class="s365-form-grid s365-form-grid-3">
            <div>
              <label for="cfg-lat">Default Latitude</label>
              <input type="number" id="cfg-lat" name="cfg_default_lat" x-model="config.default_lat" step="any">
            </div>
            <div>
              <label for="cfg-lon">Default Longitude</label>
              <input type="number" id="cfg-lon" name="cfg_default_lon" x-model="config.default_lon" step="any">
            </div>
            <div>
              <label for="cfg-zoom">Default Zoom</label>
              <input type="number" id="cfg-zoom" name="cfg_default_zoom" x-model="config.default_zoom" min="3" max="22">
            </div>
          </div>

          <label class="s365-checkbox-row" for="cfg-auto-resume">
            <input type="checkbox" id="cfg-auto-resume" name="cfg_auto_resume" x-model="config.auto_resume">
            Auto-resume last session on boot
          </label>

          <button type="submit" class="s365-btn s365-btn-primary">Save Configuration</button>
        </form>
        <p x-show="configSaved" class="s365-status-text s365-status-success">Configuration saved.</p>
        <p x-show="configError" class="s365-status-text s365-status-error" x-text="configError"></p>
      </div>

      <!-- ===== System Update ===== -->
      <div class="s365-admin-section">
        <div class="s365-section-heading">
          <div>
            <h2>System Update</h2>
            <p>Review remote availability, commit state, and updater health before applying a maintenance update.</p>
          </div>
        </div>
        <p class="s365-section-note">
          Survey365 checks for updates daily. Applying an update is manual and briefly puts the controller into maintenance mode.
        </p>

        <div x-show="updateLoading" class="s365-admin-status-panel">
          <p aria-busy="true">Checking update status...</p>
        </div>

        <div x-show="!updateLoading" class="s365-update-grid">
          <div>
            <label for="update-branch">Branch</label>
            <input type="text" id="update-branch" name="update_branch" :value="updateStatus.branch || 'main'" readonly class="s365-readonly-input">
          </div>
          <div>
            <label for="update-current-commit">Current Commit</label>
            <input type="text" id="update-current-commit" name="update_current_commit" :value="updateStatus.current_short || '--'" readonly class="s365-readonly-input">
          </div>
          <div>
            <label for="update-latest-main">Latest Main</label>
            <input type="text" id="update-latest-main" name="update_latest_main" :value="updateStatus.remote_short || (updateStatus.repo_reachable ? '--' : 'offline')" readonly class="s365-readonly-input">
          </div>
          <div>
            <label for="update-updater">Updater</label>
            <input type="text" id="update-updater" name="update_updater" :value="updateStatus.update_in_progress ? 'Running' : (updateStatus.timer_enabled ? 'Enabled' : 'Disabled')" readonly class="s365-readonly-input">
          </div>
        </div>

        <p x-show="!updateLoading && updateStatus.update_available" class="s365-status-text s365-status-info">
          Update available on <code>main</code>.
        </p>
        <p x-show="updateStatus.update_in_progress" class="s365-status-text s365-status-warn">
          Update in progress. Do not remove power until Survey365 reports completion.
        </p>
        <p x-show="!updateLoading && !updateStatus.update_available && updateStatus.repo_reachable" class="s365-status-text s365-status-success">
          System is already on the latest <code>main</code> commit.
        </p>
        <p x-show="!updateLoading && !updateStatus.repo_reachable" class="s365-status-text s365-status-warn">
          Remote repository is not reachable right now. Automatic checks will retry.
        </p>
        <p x-show="updateStatus.dirty" class="s365-status-text s365-status-error">
          Update is blocked because tracked files are dirty.
        </p>
        <template x-if="updateStatus.dirty && updateStatus.dirty_paths && updateStatus.dirty_paths.length > 0">
          <div class="s365-dirty-list">
            <template x-for="path in updateStatus.dirty_paths" :key="path">
              <div x-text="path"></div>
            </template>
          </div>
        </template>

        <div class="s365-form-actions">
          <button type="button" class="s365-btn s365-btn-secondary" @click="loadUpdateStatus()" :disabled="updateLoading">Check Now</button>
          <button type="button" class="s365-btn s365-btn-primary" @click="startUpdate()" :disabled="updateLoading || updateStatus.update_in_progress || updateStatus.dirty">
            <span x-text="updateStatus.update_in_progress ? 'Updating...' : 'Update Now'"></span>
          </button>
        </div>

        <p x-show="updateSuccess" class="s365-status-text s365-status-success" x-text="updateSuccess"></p>
        <p x-show="updateError" class="s365-status-text s365-status-error" x-text="updateError"></p>
      </div>

      <!-- ===== Change Password ===== -->
      <div class="s365-admin-section">
        <div class="s365-section-heading">
          <div>
            <h2>Change Password</h2>
            <p>Rotate the admin credential used to access the Survey365 control plane.</p>
          </div>
        </div>
        <form @submit.prevent="changePassword()" class="s365-admin-form">
          <label for="pw-current">Current Password</label>
          <input type="password" id="pw-current" name="pw_current" x-model="pwForm.current" autocomplete="current-password">

          <label for="pw-new">New Password</label>
          <input type="password" id="pw-new" name="pw_new" x-model="pwForm.new_password" autocomplete="new-password" minlength="4">

          <label for="pw-confirm">Confirm New Password</label>
          <input type="password" id="pw-confirm" name="pw_confirm" x-model="pwForm.confirm" autocomplete="new-password">

          <button type="submit" class="s365-btn s365-btn-primary">Change Password</button>
        </form>
        <p x-show="pwSuccess" class="s365-status-text s365-status-success">Password changed.</p>
        <p x-show="pwError" class="s365-status-text s365-status-error" x-text="pwError"></p>
      </div>

    </div>
  </template>

  <script>
    function adminPanel() {
      return {
        /* Auth */
        authenticated: false,
        authChecked: false,

        /* Projects */
        projects: [],
        filterProjectId: 'active',

        /* Sites */
        sites: [],
        sitesLoading: false,
        showSiteForm: false,
        editingSite: null,
        siteForm: { name: '', lat: '', lon: '', height: '', source: 'manual', accuracy_h: '', accuracy_v: '', notes: '' },
        siteFormError: '',

        /* NTRIP */
        ntripProfiles: [],
        ntripLoading: false,
        showNtripForm: false,
        editingNtrip: null,
        ntripForm: { name: '', type: 'outbound_caster', host: '', port: '', mountpoint: '', username: '', password: '', is_default: false, notes: '' },
        ntripFormError: '',

        /* Wi-Fi */
        wifiNetworks: [],
        wifiLoading: false,
        showWifiForm: false,
        editingWifi: null,
        wifiForm: { ssid: '', password: '', priority: 10, metric: 50 },
        wifiFormError: '',
        wifiApplyBusy: false,
        wifiApplySuccess: '',
        wifiApplyError: '',

        /* Config */
        config: {
          maptiler_key: '',
          default_lat: 30.69,
          default_lon: -88.05,
          default_zoom: 12,
          auto_resume: false,
          gnss_port: '/dev/ttyGNSS',
          gnss_baud: '115200',
          gnss_backend: 'ublox',
          antenna_height_m: '0.0',
          rtcm_messages: '1005(10),1077,1087,1097,1127,1230(10)',
          rinex_enabled: true,
          rinex_rotate_hours: '24',
          rinex_data_dir: 'data/rinex',
          local_caster_enabled: false,
          local_caster_port: '2101',
          local_caster_mountpoint: 'SURVEY365'
        },
        configSaved: false,
        configError: '',

        /* System update */
        updateStatus: {
          branch: 'main',
          current_short: '',
          remote_short: '',
          repo_reachable: true,
          update_available: false,
          update_in_progress: false,
          timer_enabled: false,
          dirty: false,
          dirty_paths: []
        },
        updateLoading: false,
        updateError: '',
        updateSuccess: '',
        _updatePollTimer: null,

        /* Password */
        pwForm: { current: '', new_password: '', confirm: '' },
        pwSuccess: false,
        pwError: '',

        async init() {
          await this._checkAuth();
          if (this.authenticated) {
            await this._loadProjects();
            this._loadSites();
            this._loadNtrip();
            this._loadWifi();
            this._loadConfig();
            await this.loadUpdateStatus();
            this._scheduleUpdatePoll();
          }
        },

        _scheduleUpdatePoll(delayMs) {
          if (this._updatePollTimer) clearTimeout(this._updatePollTimer);
          var delay = delayMs != null ? delayMs : (this.updateStatus.update_in_progress ? 3000 : 3600000);
          this._updatePollTimer = setTimeout(() => this.loadUpdateStatus(), delay);
        },

        async _loadProjects() {
          try {
            var res = await fetch('/api/projects');
            if (res.ok) {
              var data = await res.json();
              this.projects = data.projects || [];
              /* Default filter to active project */
              if (data.active_project_id) {
                this.filterProjectId = String(data.active_project_id);
              }
            }
          } catch (_) {}
        },

        async _checkAuth() {
          try {
            var res = await fetch('/api/auth/check');
            if (res.ok) {
              var data = await res.json();
              this.authenticated = data.authenticated || false;
            }
          } catch (_) {
            this.authenticated = false;
          }
          this.authChecked = true;
        },

        /* ======= Sites CRUD ======= */

        async _loadSites() {
          this.sitesLoading = true;
          try {
            var url = '/api/sites?limit=500';
            if (this.filterProjectId === 'all') {
              url += '&all_projects=true';
            } else if (this.filterProjectId && this.filterProjectId !== 'active') {
              url += '&project_id=' + this.filterProjectId;
            }
            var res = await fetch(url);
            if (res.ok) {
              var data = await res.json();
              this.sites = data.sites || [];
            }
          } catch (_) {}
          this.sitesLoading = false;
        },

        openAddSite() {
          this.editingSite = null;
          this.siteForm = { name: '', lat: '', lon: '', height: '', source: 'manual', accuracy_h: '', accuracy_v: '', notes: '' };
          this.siteFormError = '';
          this.showSiteForm = true;
        },

        editSite(site) {
          this.editingSite = site;
          this.siteForm = {
            name: site.name || '',
            lat: site.lat || '',
            lon: site.lon || '',
            height: site.height || '',
            source: site.source || 'manual',
            accuracy_h: site.accuracy_h || '',
            accuracy_v: site.accuracy_v || '',
            notes: site.notes || ''
          };
          this.siteFormError = '';
          this.showSiteForm = true;
        },

        closeSiteForm() {
          this.showSiteForm = false;
          this.editingSite = null;
          this.siteFormError = '';
        },

        async saveSite() {
          this.siteFormError = '';

          if (!this.siteForm.name || !this.siteForm.lat || !this.siteForm.lon) {
            this.siteFormError = 'Name, latitude, and longitude are required.';
            return;
          }

          var body = {
            name: this.siteForm.name.trim(),
            lat: parseFloat(this.siteForm.lat),
            lon: parseFloat(this.siteForm.lon)
          };

          if (this.siteForm.height !== '' && this.siteForm.height != null) {
            body.height = parseFloat(this.siteForm.height);
          }
          if (this.siteForm.source) body.source = this.siteForm.source;
          if (this.siteForm.accuracy_h !== '' && this.siteForm.accuracy_h != null) {
            body.accuracy_h = parseFloat(this.siteForm.accuracy_h);
          }
          if (this.siteForm.accuracy_v !== '' && this.siteForm.accuracy_v != null) {
            body.accuracy_v = parseFloat(this.siteForm.accuracy_v);
          }
          if (this.siteForm.notes) body.notes = this.siteForm.notes.trim();

          try {
            var url, method;
            if (this.editingSite) {
              url = '/api/sites/' + this.editingSite.id;
              method = 'PUT';
            } else {
              url = '/api/sites';
              method = 'POST';
            }

            var res = await fetch(url, {
              method: method,
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(body)
            });

            if (res.ok) {
              this.closeSiteForm();
              await this._loadSites();
            } else {
              var err = {};
              try { err = await res.json(); } catch (_) {}
              this.siteFormError = err.error || err.detail || 'Failed to save point.';
            }
          } catch (err) {
            this.siteFormError = 'Network error: ' + err.message;
          }
        },

        async deleteSite(site) {
          if (!confirm('Delete "' + site.name + '"? This cannot be undone.')) return;

          try {
            var res = await fetch('/api/sites/' + site.id, { method: 'DELETE' });
            if (res.ok) {
              await this._loadSites();
            } else {
              alert('Failed to delete point.');
            }
          } catch (err) {
            alert('Network error: ' + err.message);
          }
        },

        /* ======= NTRIP CRUD ======= */

        async _loadNtrip() {
          this.ntripLoading = true;
          try {
            var res = await fetch('/api/ntrip');
            if (res.ok) {
              var data = await res.json();
              this.ntripProfiles = data.profiles || [];
            }
          } catch (_) {}
          this.ntripLoading = false;
        },

        openAddNtrip() {
          this.editingNtrip = null;
          this.ntripForm = { name: '', type: 'outbound_caster', host: '', port: '', mountpoint: '', username: '', password: '', is_default: false, notes: '' };
          this.ntripFormError = '';
          this.showNtripForm = true;
        },

        editNtrip(profile) {
          this.editingNtrip = profile;
          this.ntripForm = {
            name: profile.name || '',
            type: profile.type || 'outbound_caster',
            host: profile.host || '',
            port: profile.port || '',
            mountpoint: profile.mountpoint || '',
            username: profile.username || '',
            password: profile.password || '',
            is_default: profile.is_default || false,
            notes: profile.notes || ''
          };
          this.ntripFormError = '';
          this.showNtripForm = true;
        },

        closeNtripForm() {
          this.showNtripForm = false;
          this.editingNtrip = null;
          this.ntripFormError = '';
        },

        async saveNtrip() {
          this.ntripFormError = '';
          if (!this.ntripForm.name || !this.ntripForm.type) {
            this.ntripFormError = 'Name and type are required.';
            return;
          }

          var body = {
            name: this.ntripForm.name.trim(),
            type: this.ntripForm.type,
            is_default: this.ntripForm.is_default || false
          };
          if (this.ntripForm.host) body.host = this.ntripForm.host.trim();
          if (this.ntripForm.port) body.port = parseInt(this.ntripForm.port);
          if (this.ntripForm.mountpoint) body.mountpoint = this.ntripForm.mountpoint.trim();
          if (this.ntripForm.username) body.username = this.ntripForm.username.trim();
          if (this.ntripForm.password) body.password = this.ntripForm.password;
          if (this.ntripForm.notes) body.notes = this.ntripForm.notes.trim();

          try {
            var url, method;
            if (this.editingNtrip) {
              url = '/api/ntrip/' + this.editingNtrip.id;
              method = 'PUT';
            } else {
              url = '/api/ntrip';
              method = 'POST';
            }

            var res = await fetch(url, {
              method: method,
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(body)
            });

            if (res.ok) {
              this.closeNtripForm();
              await this._loadNtrip();
            } else {
              var err = {};
              try { err = await res.json(); } catch (_) {}
              this.ntripFormError = err.error || err.detail || 'Failed to save profile.';
            }
          } catch (err) {
            this.ntripFormError = 'Network error: ' + err.message;
          }
        },

        async deleteNtrip(profile) {
          if (!confirm('Delete NTRIP profile "' + profile.name + '"?')) return;
          try {
            var res = await fetch('/api/ntrip/' + profile.id, { method: 'DELETE' });
            if (res.ok) {
              await this._loadNtrip();
            } else {
              alert('Failed to delete profile.');
            }
          } catch (err) {
            alert('Network error: ' + err.message);
          }
        },

        /* ======= Config ======= */

        async _loadWifi() {
          this.wifiLoading = true;
          try {
            var res = await fetch('/api/wifi');
            if (res.ok) {
              var data = await res.json();
              this.wifiNetworks = data.networks || [];
            }
          } catch (_) {}
          this.wifiLoading = false;
        },

        openAddWifi() {
          this.editingWifi = null;
          this.wifiForm = { ssid: '', password: '', priority: 10, metric: 50 };
          this.wifiFormError = '';
          this.showWifiForm = true;
        },

        editWifi(network) {
          this.editingWifi = network;
          this.wifiForm = {
            ssid: network.ssid || '',
            password: '',
            priority: network.priority != null ? network.priority : 10,
            metric: network.metric != null ? network.metric : 50
          };
          this.wifiFormError = '';
          this.showWifiForm = true;
        },

        closeWifiForm() {
          this.showWifiForm = false;
          this.editingWifi = null;
          this.wifiFormError = '';
        },

        async saveWifi() {
          this.wifiFormError = '';
          if (!this.wifiForm.ssid) {
            this.wifiFormError = 'SSID is required.';
            return;
          }
          if (!this.editingWifi && !this.wifiForm.password) {
            this.wifiFormError = 'Password is required for new Wi-Fi networks.';
            return;
          }

          var body = {
            ssid: this.wifiForm.ssid.trim(),
            priority: parseInt(this.wifiForm.priority || 0),
            metric: parseInt(this.wifiForm.metric || 50)
          };
          if (this.wifiForm.password) body.password = this.wifiForm.password;

          try {
            var url, method;
            if (this.editingWifi) {
              url = '/api/wifi/' + this.editingWifi.id;
              method = 'PUT';
            } else {
              url = '/api/wifi';
              method = 'POST';
            }
            var res = await fetch(url, {
              method: method,
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(body)
            });

            if (res.ok) {
              this.closeWifiForm();
              await this._loadWifi();
            } else {
              var err = {};
              try { err = await res.json(); } catch (_) {}
              this.wifiFormError = err.detail || err.error || 'Failed to save Wi-Fi network.';
            }
          } catch (err) {
            this.wifiFormError = 'Network error: ' + err.message;
          }
        },

        async deleteWifi(network) {
          if (!confirm('Delete Wi-Fi network "' + network.ssid + '"?')) return;
          try {
            var res = await fetch('/api/wifi/' + network.id, { method: 'DELETE' });
            if (res.ok) {
              await this._loadWifi();
            } else {
              var err = {};
              try { err = await res.json(); } catch (_) {}
              alert(err.detail || err.error || 'Failed to delete Wi-Fi network.');
            }
          } catch (err) {
            alert('Network error: ' + err.message);
          }
        },

        async applyWifi() {
          this.wifiApplyBusy = true;
          this.wifiApplySuccess = '';
          this.wifiApplyError = '';
          try {
            var res = await fetch('/api/wifi/apply', { method: 'POST' });
            if (res.ok) {
              var data = await res.json();
              this.wifiApplySuccess = data.output || 'Wi-Fi settings applied.';
            } else {
              var err = {};
              try { err = await res.json(); } catch (_) {}
              this.wifiApplyError = err.detail || err.error || 'Failed to apply Wi-Fi settings.';
            }
          } catch (err) {
            this.wifiApplyError = 'Network error: ' + err.message;
          }
          this.wifiApplyBusy = false;
        },

        async _loadConfig() {
          try {
            var res = await fetch('/api/config');
            if (res.ok) {
              var data = await res.json();
              this.config.maptiler_key = data.maptiler_key || '';
              this.config.default_lat = data.default_lat || 30.69;
              this.config.default_lon = data.default_lon || -88.05;
              this.config.default_zoom = data.default_zoom || 12;
              this.config.auto_resume = data.auto_resume === true || data.auto_resume === 'true';
              this.config.gnss_port = data.gnss_port || '/dev/ttyGNSS';
              this.config.gnss_baud = data.gnss_baud || '115200';
              this.config.gnss_backend = data.gnss_backend || 'ublox';
              this.config.antenna_height_m = data.antenna_height_m || '0.0';
              this.config.rtcm_messages = data.rtcm_messages || '1005(10),1077,1087,1097,1127,1230(10)';
              this.config.rinex_enabled = data.rinex_enabled === true || data.rinex_enabled === 'true';
              this.config.rinex_rotate_hours = data.rinex_rotate_hours || '24';
              this.config.rinex_data_dir = data.rinex_data_dir || 'data/rinex';
              this.config.local_caster_enabled = data.local_caster_enabled === true || data.local_caster_enabled === 'true';
              this.config.local_caster_port = data.local_caster_port || '2101';
              this.config.local_caster_mountpoint = data.local_caster_mountpoint || 'SURVEY365';
            }
          } catch (_) {}
        },

        async saveConfig() {
          this.configSaved = false;
          this.configError = '';

          try {
            var res = await fetch('/api/config', {
              method: 'PUT',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                maptiler_key: this.config.maptiler_key,
                default_lat: String(this.config.default_lat),
                default_lon: String(this.config.default_lon),
                default_zoom: String(this.config.default_zoom),
                auto_resume: this.config.auto_resume ? 'true' : 'false',
                gnss_port: this.config.gnss_port,
                gnss_baud: String(this.config.gnss_baud),
                gnss_backend: this.config.gnss_backend,
                antenna_height_m: String(this.config.antenna_height_m),
                rtcm_messages: this.config.rtcm_messages,
                rinex_enabled: this.config.rinex_enabled ? 'true' : 'false',
                rinex_rotate_hours: String(this.config.rinex_rotate_hours),
                rinex_data_dir: this.config.rinex_data_dir,
                local_caster_enabled: this.config.local_caster_enabled ? 'true' : 'false',
                local_caster_port: String(this.config.local_caster_port),
                local_caster_mountpoint: this.config.local_caster_mountpoint
              })
            });

            if (res.ok) {
              this.configSaved = true;
              var self = this;
              setTimeout(function () { self.configSaved = false; }, 3000);
            } else {
              var err = {};
              try { err = await res.json(); } catch (_) {}
              this.configError = err.error || 'Failed to save.';
            }
          } catch (err) {
            this.configError = 'Network error: ' + err.message;
          }
        },

        /* ======= System Update ======= */

        async loadUpdateStatus() {
          this.updateLoading = true;
          this.updateError = '';
          try {
            var res = await fetch('/api/system/update-status');
            if (res.ok) {
              this.updateStatus = await res.json();
            } else {
              var err = {};
              try { err = await res.json(); } catch (_) {}
              this.updateError = err.detail || err.error || 'Failed to load update status.';
            }
          } catch (err) {
            this.updateError = 'Network error: ' + err.message;
          }
          this.updateLoading = false;
          this._scheduleUpdatePoll();
        },

        async startUpdate() {
          this.updateError = '';
          this.updateSuccess = '';
          if (!confirm('Apply the update now? Survey365 will briefly enter maintenance mode. Do not remove power until the update finishes.')) {
            return;
          }
          try {
            var res = await fetch('/api/system/update', { method: 'POST' });
            if (res.ok) {
              var data = await res.json();
              this.updateSuccess = data.message || 'Update started.';
              await this.loadUpdateStatus();
              this._scheduleUpdatePoll(3000);
            } else {
              var err = {};
              try { err = await res.json(); } catch (_) {}
              this.updateError = err.detail || err.error || 'Failed to start update.';
            }
          } catch (err) {
            this.updateError = 'Network error: ' + err.message;
          }
        },

        /* ======= Password Change ======= */

        async changePassword() {
          this.pwSuccess = false;
          this.pwError = '';

          if (!this.pwForm.new_password) {
            this.pwError = 'New password is required.';
            return;
          }
          if (this.pwForm.new_password.length < 4) {
            this.pwError = 'Password must be at least 4 characters.';
            return;
          }
          if (this.pwForm.new_password !== this.pwForm.confirm) {
            this.pwError = 'Passwords do not match.';
            return;
          }

          try {
            var res = await fetch('/api/auth/password', {
              method: 'PUT',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                current: this.pwForm.current || null,
                new_password: this.pwForm.new_password
              })
            });

            if (res.ok) {
              this.pwSuccess = true;
              this.pwForm = { current: '', new_password: '', confirm: '' };
              var self = this;
              setTimeout(function () { self.pwSuccess = false; }, 3000);
            } else {
              var err = {};
              try { err = await res.json(); } catch (_) {}
              this.pwError = err.error || 'Failed to change password.';
            }
          } catch (err) {
            this.pwError = 'Network error: ' + err.message;
          }
        }
      };
    }
  </script>
</body>
</html>
