# ── WiFi Networks ───────────────────────────────────────────────────
# Format: WIFI_<n>=SSID|PASSWORD|PRIORITY|METRIC
#
# PRIORITY: higher number = tried first (NetworkManager autoconnect-priority)
# METRIC:   lower number  = preferred route when multiple interfaces connected
#
# Networks are configured on BOTH adapters (wlan0 + wlan1).
# wlan1 (Alfa USB) gets a lower metric so it carries traffic when present.
# wlan0 (internal) is the fallback if wlan1 is unplugged.

